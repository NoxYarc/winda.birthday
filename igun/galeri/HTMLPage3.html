<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Galeri Foto Windaaa</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #fdfdfd;
        }

        .navbar {
            background: #AA336A;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .section-title {
            color: #AA336A;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .img-card {
            transition: 0.3s;
        }

            .img-card:hover {
                transform: scale(1.05);
            }

        footer {
            background: #AA336A;
            color: white;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand"><i class="fa fa-image"></i> Galeri Windaaa</a>
        </div>
    </nav>

    <!-- GALERI FOTO -->
    <div class="container" id="galeri">
        <h2 class="section-title"><i class="fa fa-camera"></i> Galeri Foto</h2>
        <div class="row">
            <div class="col-md-4">
                <img src="images/foto1.jpeg" class="img-fluid rounded img-card mb-3" alt="Foto 1">
            </div>
            <div class="col-md-4">
                <img src="images/foto2.jpeg" class="img-fluid rounded img-card mb-3" alt="Foto 2">
            </div>
            <div class="col-md-4">
                <img src="images/foto3.jpeg" class="img-fluid rounded img-card mb-3" alt="Foto 3">
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-center">
        Dibuat dengan penuh cinta 💖
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
